syntax = "proto3";

package deespee;

option go_package = "github.com/karolsudol/deespee/adexchange/proto";

// --- Agent Communication ---

message AgentRequest {
  string request_id = 1;
  string query = 2;
  map<string, string> metadata = 3;
}

message AgentResponse {
  string request_id = 1;
  string content = 2;
  bool success = 3;
  string error_message = 4;
}

// --- RTB Bidding Path ---

message BidRequest {
  string id = 1;
  User user = 2;
  Device device = 3;
}

message User {
  string id = 1;
}

message Device {
  string ua = 1;
  string ip = 2;
}

message BidResponse {
  string id = 1;
  string bidid = 2;
  float price = 3;
}

// --- Feedback Loop ---

message DspAction {
  string action_id = 1;
  string agent_request_id = 2;
  string type = 3;
  string payload = 4;
}

message DmpUpdate {
  string update_id = 1;
  string agent_request_id = 2;
  string key = 3;
  string value = 4;
}
