syntax = "proto3";

package deespee;

option go_package = "github.com/karolsudol/deespee/adexchange/proto";

// --- Agent Communication ---

message AgentRequest {
  string request_id = 1;
  string query = 2;
  map<string, string> metadata = 3;
}

message AgentResponse {
  string request_id = 1;
  string content = 2;
  bool success = 3;
  string error_message = 4;
}

// --- RTB Bidding Path ---

message BidRequest {
  string id = 1;
  User user = 2;
  Device device = 3;
  Site site = 4;
  Impression imp = 5;
  string test = 6; // Is this a test request?
}

message User {
  string id = 1;
  repeated string segments = 2;
}

message Device {
  string ua = 1;
  string ip = 2;
  string devicetype = 3; // phone, desktop, tablet, tv
  string make = 4;       // e.g. "Apple"
  string model = 5;      // e.g. "iPhone 15"
  string os = 6;         // e.g. "iOS"
  Geo geo = 7;
}

message Geo {
  string country = 1;
  string city = 2;
  double lat = 3;
  double lon = 4;
}

message Site {
  string id = 1;
  string domain = 2;
  string page = 3;       // Full URL of the page
  repeated string cat = 4; // Content Categories
}

message Impression {
  string id = 1;
  uint32 w = 2;
  uint32 h = 3;
  string pos = 4;
}

message BidResponse {
  string id = 1;
  string bidid = 2;
  float price = 3;
  string adid = 4;       // Ad ID
  string crid = 5;       // Creative ID
  string adm = 6;        // Ad Markup (HTML/JS)
  string nurl = 7;       // Win notice URL
  repeated string cat = 8; // Creative categories
}

// --- DMP / Audience Path ---

message UserSegmentRequest {
  string user_id = 1;
}

message UserSegmentResponse {
  string user_id = 1;
  repeated string segments = 2;
}

// --- Feedback & Event Loop (Asynchronous) ---

message EventNotification {
  enum EventType {
    WIN = 0;
    IMPRESSION = 1;
    CLICK = 2;
    CONVERSION = 3;
  }
  string event_id = 1;
  EventType type = 2;
  string user_id = 3;
  string bid_id = 4;
  string ad_id = 5;
  float cost = 6;
  uint64 timestamp = 7;
  string campaign_id = 8;
}

enum BidType {
  CPM = 0;
  ECPC = 1;
}

message Campaign {
  string id = 1;
  string name = 2;
  float total_budget = 3;
  float daily_budget = 4;
  repeated string targeted_segments = 5;
  repeated string targeted_cities = 6;
  repeated string targeted_categories = 7;
  BidType bid_type = 8;
  float target_value = 9; // CPM price or eCPC target
}

message CampaignState {
  string campaign_id = 1;
  float spent_today = 2;
}

message CampaignListRequest {}

message CampaignListResponse {
  repeated Campaign campaigns = 1;
  repeated CampaignState states = 2;
}

message DspAction {
  string action_id = 1;
  string agent_request_id = 2;
  string type = 3;
  string payload = 4;
}

message DmpUpdate {
  string update_id = 1;
  string agent_request_id = 2;
  string key = 3;
  string value = 4;
}
